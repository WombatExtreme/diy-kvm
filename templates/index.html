<!DOCTYPE html>
<html>
<head>
    <title>Wombat Extreme KVM</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        #kvm-container { 
            margin: 20px auto; width: 90%; max-width: 1280px; 
            border: 5px solid #333; background: #000; cursor: crosshair;
        }
        #video-feed { width: 100%; display: block; }
        .controls { margin-top: 20px; padding: 20px; background: #222; border-radius: 10px; display: inline-block; }
        .btn-update { 
            background: #f39c12; color: #000; border: none; padding: 12px 24px; 
            font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase;
        }
        .btn-update:hover { background: #e67e22; }
        .info { color: #777; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>WOMBAT EXTREME KVM <span style="color: #2ecc71;">[LIVE]</span></h2>
    <p>Connected to: <span id="current-ip" style="color: #f39c12;">detecting...</span></p>

    <div id="kvm-container">
        <img id="video-feed" src="" alt="Waiting for Hardware (Check Port 8000)...">
    </div>

    <div class="controls">
        <button class="btn-update" onclick="location.reload()">REFRESH HARDWARE LINK</button>
        <div class="info">72-HOUR BURN-IN: DHCP ADAPTIVE MODE</div>
    </div>

    <script>
        // Get current IP/Hostname (will be 192.168.3.113)
        const host = window.location.hostname;
        const flaskPort = window.location.port || '5000';
        
        document.getElementById('current-ip').innerText = host;

        // Point video to uStreamer on Port 8000
        const video = document.getElementById('video-feed');
        video.src = `http://${host}:8000/stream`;

        // Mouse Tracker
        document.getElementById('kvm-container').addEventListener('mousemove', function(e) {
            const rect = this.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            
            fetch(`http://${host}:${flaskPort}/send_mouse`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ x: x, y: y })
            }).catch(() => {}); // Silent fail to keep UI smooth
        });
    </script>
</body>
</html>
