<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wombat DIY-KVM Adaptive</title>
    <style>
        /* --- SHARED STYLES --- */
        body { background:#111; color:#0f0; font-family:sans-serif; margin:0; text-align:center; }
        #dash { background:#222; padding:10px; border-bottom:1px solid #444; font-size:12px; display:flex; justify-content:center; gap:15px; }
        #dash span { color:#fff; }
        #container { position:relative; display:inline-block; border:5px solid #333; margin-top:10px; }
        #stream { display:block; max-width:100%; height:auto; }
        
        .controls { margin-top:15px; display:flex; justify-content:center; gap:10px; padding:10px; }
        .btn { background:#333; color:#0f0; border:1px solid #0f0; padding:10px 20px; cursor:pointer; font-weight:bold; }
        .btn:hover { background:#0f0; color:#000; }
        .danger { border-color:red; color:red; }

        /* --- DESKTOP SPECIFIC (Screen > 800px) --- */
        @media (min-width: 801px) {
            #mobile-input-zone { display: none; } /* Hide mobile keyboard area on desktop */
            .btn { font-size: 14px; }
        }

        /* --- MOBILE SPECIFIC (Screen < 800px) --- */
        @media (max-width: 800px) {
            #dash { font-size: 10px; flex-wrap: wrap; }
            .controls { flex-direction: column; align-items: center; }
            .btn { width: 90%; padding: 20px; font-size: 18px; } /* Big touch targets */
            #container { border: none; }
            #mobile-input-zone { display: block; margin-top: 20px; }
            #pbox { width: 90%; background: #000; color: #0f0; border: 1px solid #0f0; padding: 15px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="dash">
        <div>CPU: <span id="c">-</span></div>
        <div>RAM: <span id="r">-</span></div>
        <div>TEMP: <span id="t">-</span></div>
        <div>PWR: <span id="p">-</span></div>
    </div>

    <div id="container">
        <img id="stream" src="http://{{ request.host.split(':')[0] }}:8080/stream">
    </div>

    <div class="controls">
        <button class="btn" onclick="window.location='/screenshot'">📸 SAVE SCREENSHOT</button>
        <button class="btn danger" onclick="sendKey('Delete', true, true)">🔥 CTRL+ALT+DEL</button>
    </div>

    <div id="mobile-input-zone">
        <p style="font-size: 12px; color: #666;">Mobile Keyboard Mode</p>
        <textarea id="pbox" placeholder="Tap here to type..."></textarea>
    </div>

    <script>
        // Keyboard Logic
        window.addEventListener('keydown', (e) => {
            if(document.activeElement.id === 'pbox') return;
            e.preventDefault();
            sendKey(e.key, e.shiftKey, e.ctrlKey, e.altKey);
        });

        function sendKey(key, shift=false, ctrl=false, alt=false) {
            fetch('/send_key', {
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({key:key, shift:shift, ctrl:ctrl, alt:alt})
            });
        }

        // Telemetry Heartbeat
        setInterval(() => {
            fetch('/stats').then(r=>r.json()).then(d=>{
                document.getElementById('c').innerText=d.cpu;
                document.getElementById('r').innerText=d.ram;
                document.getElementById('p').innerText=d.pwr;
                document.getElementById('t').innerText=d.temp;
            });
        }, 2000);
    </script>
</body>
</html>
